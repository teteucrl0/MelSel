# Datasource (dev placeholder - update in production)
spring.datasource.url=jdbc:mysql://localhost:3306/mellsell?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# JWT settings (replace secret in production with a secure value of sufficient length)
jwt.secret=replace_this_with_a_secure_long_secret_key
jwt.expirationMs=3600000

# Admin seed (optional) - prefer env variables MELSELL_ADMIN_EMAIL and MELSELL_ADMIN_PASSWORD
# If you set these properties (or the env vars), an admin user will be created at startup.
# For security, prefer exporting env vars rather than committing values to this file.
mellsell.admin.email=
mellsell.admin.password=

# Flyway (prepared for MySQL migrations; keep disabled until full baseline is added)
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
