# Perfil padrão: MySQL (use --spring.profiles.active=h2 ou presentation para H2)
spring.profiles.default=mysql

# JWT settings (replace secret in production with a secure value of sufficient length)
# Defina JWT_SECRET como variável de ambiente em produção
jwt.secret=${JWT_SECRET:replace_this_with_a_secure_long_secret_key}
jwt.expirationMs=3600000
# Produção: mellsell.security.reject-weak-jwt-secret=true e JWT_SECRET forte (32+ chars)
mellsell.security.reject-weak-jwt-secret=false
# Produção: origens explícitas, ex. https://app.seudominio.com (vírgula = várias)
# mellsell.cors.allowed-origin-patterns=https://app.seudominio.com

# Admin seed (optional) - prefer env variables MELSELL_ADMIN_EMAIL and MELSELL_ADMIN_PASSWORD
# If you set these properties (or the env vars), an admin user will be created at startup.
# For security, prefer exporting env vars rather than committing values to this file.
mellsell.admin.email=
mellsell.admin.password=

# Upload de imagens de produto
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
mellsell.upload.dir=uploads

# Rastreamento: simulated (timeline por tempo) ou live (etapas via WebSocket, ver application-presentation)
mellsell.tracking.mode=simulated
mellsell.tracking.live-enabled=false
mellsell.tracking.step-interval-seconds=8
mellsell.tracking.initial-delay-seconds=2

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
