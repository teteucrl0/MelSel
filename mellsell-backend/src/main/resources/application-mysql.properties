# Perfil MySQL — banco persistente com Flyway (produção e demo na rede).
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:mellsell}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&characterEncoding=utf8
spring.datasource.username=${MYSQL_USER:mellsell}
spring.datasource.password=${MYSQL_PASSWORD:mellsell}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

server.address=0.0.0.0

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
mellsell.upload.dir=uploads

jwt.secret=${JWT_SECRET:mellsell-mysql-dev-secret-key-32chars!!}
jwt.expirationMs=86400000

mellsell.tracking.mode=simulated
mellsell.tracking.live-enabled=true
mellsell.tracking.step-interval-seconds=8
mellsell.tracking.initial-delay-seconds=2

mellsell.admin.email=
mellsell.admin.password=