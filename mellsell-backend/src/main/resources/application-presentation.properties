# Perfil para apresentação na faculdade: dados persistem entre reinícios (H2 em arquivo).
# Não precisa instalar MySQL. Arquivo: mellsell-backend/data/presentation/

spring.datasource.url=jdbc:h2:file:./data/presentation/mellsell;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# update falha ao adicionar coluna NOT NULL em tabelas com dados; patch manual em PresentationSchemaPatch
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway desligado aqui (migrations são para MySQL). Schema evolui via JPA update.
spring.flyway.enabled=false

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
mellsell.upload.dir=uploads

jwt.secret=${JWT_SECRET:mellsell-presentation-secret-key-32chars!!}
jwt.expirationMs=86400000

# Aceita conexões de outros IPs na rede (apresentação / demo)
server.address=0.0.0.0

# Rastreamento ao vivo (WebSocket) — ideal para demonstração em sala de aula
mellsell.tracking.mode=simulated
mellsell.tracking.live-enabled=true
mellsell.tracking.step-interval-seconds=8
mellsell.tracking.initial-delay-seconds=2

# Admin criado na primeira subida (defina por env se quiser outro e-mail)
mellsell.admin.email=
mellsell.admin.password=