# H2 in-memory config for quick testing
spring.datasource.url=jdbc:h2:mem:mellsell;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create
spring.h2.console.enabled=true
spring.flyway.enabled=false

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
mellsell.upload.dir=uploads

# JWT settings (copied from application.properties)
# Defina JWT_SECRET como variável de ambiente em produção
jwt.secret=${JWT_SECRET:mellsell-dev-secret-key-for-local-only-32chars!!}
jwt.expirationMs=3600000

# Admin seed properties (prefer env vars)
mellsell.admin.email=
mellsell.admin.password=
